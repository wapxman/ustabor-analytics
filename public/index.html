<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustabor — AI CEO Аналитика</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:#0a0a0f;color:#fff;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:#fff;border-bottom:1px solid rgba(0,0,0,0.08)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 2rem;height:72px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;text-decoration:none}
.logo-img{height:44px;width:auto;object-fit:contain}
.nav-links{display:flex;gap:2rem;list-style:none;align-items:center}
.nav-links a{color:#6e6e73;text-decoration:none;font-size:.9rem;font-weight:500}
.nav-cta{padding:10px 24px;background:#0071e3;color:#fff!important;border-radius:980px}

.tabs-bar{position:fixed;top:72px;left:0;right:0;z-index:999;background:#111118;border-bottom:1px solid rgba(255,255,255,0.06)}
.tabs-inner{max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;gap:0}
.tab{padding:14px 24px;font-size:.85rem;font-weight:500;color:#6e6e73;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:#fff}
.tab.active{color:#2997ff;border-bottom-color:#2997ff}

.content{max-width:1200px;margin:0 auto;padding:152px 2rem 3rem}
.report-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.report-header h1{font-size:1.8rem;font-weight:700;letter-spacing:-0.03em}
.report-header p{color:#6e6e73;font-size:.9rem;margin-top:.3rem}
.filters{display:flex;gap:.5rem;align-items:center}
.yr-btn{padding:8px 18px;border-radius:980px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#6e6e73;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.yr-btn:hover{border-color:rgba(255,255,255,0.3);color:#fff}
.yr-btn.active{background:#2997ff;border-color:#2997ff;color:#fff}

.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1.5rem}
.mc{background:#16161e;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:1.2rem}
.mc .l{font-size:.7rem;color:#6e6e73;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.mc .v{font-size:1.6rem;font-weight:700;letter-spacing:-0.03em}
.mc .c{font-size:.75rem;margin-top:.2rem;color:#30d158;font-weight:500}
.vb{color:#2997ff}.vp{color:#bf5af2}.vg{color:#30d158}.va{color:#ff9f0a}

.charts-row{display:grid;grid-template-columns:3fr 2fr;gap:.8rem;margin-bottom:.8rem}
.cb{background:#16161e;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:1.2rem;margin-bottom:.8rem}
.cb h3{font-size:.85rem;font-weight:600;margin-bottom:.8rem}
.chart-wrap{position:relative;height:220px}

.tb{background:#16161e;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:1.2rem;overflow-x:auto;margin-bottom:.8rem}
.tb h3{font-size:.85rem;font-weight:600;margin-bottom:.8rem}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{text-align:left;padding:8px 10px;color:#6e6e73;font-weight:500;border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,0.02)}
.n{text-align:right;font-variant-numeric:tabular-nums}
.total td{font-weight:600;border-top:2px solid rgba(255,255,255,0.1)}

.loading{text-align:center;padding:4rem;color:#6e6e73}
.loading .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#2997ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

.placeholder{text-align:center;padding:6rem 2rem;color:#6e6e73}
@media(max-width:900px){.metrics-grid{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}}
@media(max-width:600px){.metrics-grid{grid-template-columns:1fr}.tabs-inner{overflow-x:auto}.nav-links{display:none}.report-header{flex-direction:column}}
</style>
</head>
<body>
<nav><div class="nav-inner"><a href="#" class="nav-logo"><img src="logo.png" alt="Ustabor" class="logo-img"></a><ul class="nav-links"><li><a href="#" class="nav-cta">Начать</a></li></ul></div></nav>

<div class="tabs-bar"><div class="tabs-inner">
  <div class="tab active" onclick="showTab(0)">Трафик сайта</div>
  <div class="tab" onclick="showTab(1)">Каналы</div>
  <div class="tab" onclick="showTab(2)">Направления</div>
  <div class="tab" onclick="showTab(3)">Приложение</div>
</div></div>

<div class="content" id="tab-0">
  <div class="report-header">
    <div><h1>Трафик сайта — <span id="yr-title">2024</span></h1><p id="yr-sub">Загрузка данных из Google Sheets...</p></div>
    <div class="filters" id="year-filters"></div>
  </div>
  <div id="dashboard"><div class="loading"><div class="spinner"></div>Загрузка данных из Google Sheets...</div></div>
</div>

<div class="content" id="tab-1" style="display:none"><div class="placeholder"><h1>Каналы</h1><p>Скоро будет добавлен</p></div></div>
<div class="content" id="tab-2" style="display:none"><div class="placeholder"><h1>Направления</h1><p>Скоро будет добавлен</p></div></div>
<div class="content" id="tab-3" style="display:none"><div class="placeholder"><h1>Приложение</h1><p>Скоро будет добавлен</p></div></div>

<script>
function showTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  for(let i=0;i<4;i++){const e=document.getElementById('tab-'+i);if(e)e.style.display=i===n?'block':'none'}
}

const SHEET_ID='1VkQwl1aknuWDExiTqadsvf6FmnLWcUwCEsM_joUAmmk';
const MONTHS_RU={
  'январь':0,'февраль':1,'март':2,'апрель':3,'май':4,'июнь':5,
  'июль':6,'август':7,'сентябрь':8,'октябрь':9,'ноябрь':10,'декабрь':11
};
const MONTH_SHORT=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MONTH_FULL=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

let ALL_DATA={};
let curYear=2024;
let chart1=null,chart2=null,chart3=null;
const gc='rgba(255,255,255,0.04)',tc='#6e6e73';

function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')}
function parseNum(s){if(!s)return 0;return parseInt(String(s).replace(/\s/g,'').replace(/,/g,''))||0}
function parseConv(s){if(!s)return 0;return parseFloat(String(s).replace(',','.').replace('%',''))||0}

async function loadData(){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('Каналы')}`;
    const res=await fetch(url);
    const text=await res.text();
    const json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?/)[1]);
    const rows=json.table.rows;
    
    let currentMonth=null,currentYear=null;
    
    rows.forEach(row=>{
      const cells=row.c||[];
      const a=cells[0]?cells[0].v:'';
      if(!a)return;
      const str=String(a).trim();
      
      const monthMatch=str.match(/^(\S+)\s+(\d{4})$/i);
      if(monthMatch){
        const mName=monthMatch[1].toLowerCase();
        const year=parseInt(monthMatch[2]);
        if(MONTHS_RU[mName]!==undefined){
          currentMonth=MONTHS_RU[mName];
          currentYear=year;
          if(!ALL_DATA[year])ALL_DATA[year]={months:{}};
          if(!ALL_DATA[year].months[currentMonth])ALL_DATA[year].months[currentMonth]={channels:[],total:null};
        }
        return;
      }
      
      if(str==='Канал'||!currentYear)return;
      
      const visitors=cells[1]?parseNum(cells[1].v):0;
      const clicks=cells[2]?parseNum(cells[2].v):0;
      const leads=cells[3]?parseNum(cells[3].v):0;
      const conv=cells[4]?(cells[4].v||cells[4].f||'0%'):'0%';
      
      if(str==='Итого'){
        ALL_DATA[currentYear].months[currentMonth].total={visitors,clicks,leads,conv:parseConv(conv)};
      }else{
        ALL_DATA[currentYear].months[currentMonth].channels.push({name:str,visitors,clicks,leads,conv:parseConv(conv)});
      }
    });
    
    renderYearButtons();
    const years=Object.keys(ALL_DATA).map(Number).sort();
    if(years.includes(2024))curYear=2024;
    else curYear=years[years.length-1];
    render();
  }catch(e){
    document.getElementById('dashboard').innerHTML=`<div class="loading" style="color:#ff453a">Ошибка загрузки: ${e.message}<br><br>Убедитесь что таблица доступна по ссылке (Файл → Поделиться → Все у кого есть ссылка)</div>`;
  }
}

function renderYearButtons(){
  const years=Object.keys(ALL_DATA).map(Number).sort();
  document.getElementById('year-filters').innerHTML=years.map(y=>`<button class="yr-btn${y===curYear?' active':''}" onclick="setYear(${y})">${y}</button>`).join('');
}

function setYear(y){
  curYear=y;
  renderYearButtons();
  render();
}

function render(){
  const yearData=ALL_DATA[curYear];
  if(!yearData){document.getElementById('dashboard').innerHTML='<div class="loading">Нет данных</div>';return;}
  
  const sortedMonths=Object.keys(yearData.months).map(Number).sort((a,b)=>a-b);
  const months=[],visitors=[],clicks=[],leads=[],convs=[];
  const channelAgg={};
  
  sortedMonths.forEach(m=>{
    const d=yearData.months[m];
    if(!d.total)return;
    months.push(MONTH_SHORT[m]);
    visitors.push(d.total.visitors);
    clicks.push(d.total.clicks);
    leads.push(d.total.leads);
    convs.push(d.total.conv);
    d.channels.forEach(ch=>{
      if(!channelAgg[ch.name])channelAgg[ch.name]={visitors:0,clicks:0,leads:0};
      channelAgg[ch.name].visitors+=ch.visitors;
      channelAgg[ch.name].clicks+=ch.clicks;
      channelAgg[ch.name].leads+=ch.leads;
    });
  });
  
  const tv=visitors.reduce((a,b)=>a+b,0);
  const tc2=clicks.reduce((a,b)=>a+b,0);
  const tl=leads.reduce((a,b)=>a+b,0);
  const avgConv=tv>0?((tc2/tv)*100).toFixed(1):'0';
  const firstM=MONTH_FULL[sortedMonths[0]];
  const lastM=MONTH_FULL[sortedMonths[sortedMonths.length-1]];
  
  document.getElementById('yr-title').textContent=curYear;
  document.getElementById('yr-sub').textContent=`${firstM} — ${lastM} ${curYear} · Данные из Google Sheets`;
  
  let html=`<div class="metrics-grid">
    <div class="mc"><div class="l">Посетители</div><div class="v vb">${tv>=1000?(tv/1000).toFixed(0)+'K':tv}</div><div class="c">${months.length} мес.</div></div>
    <div class="mc"><div class="l">Клики на контакты</div><div class="v vp">${tc2>=1000?(tc2/1000).toFixed(1)+'K':tc2}</div><div class="c">все каналы</div></div>
    <div class="mc"><div class="l">Заявки</div><div class="v vg">${fmt(tl)}</div><div class="c">${firstM}–${lastM}</div></div>
    <div class="mc"><div class="l">Ср. конверсия</div><div class="v va">${avgConv}%</div><div class="c">клики/посетители</div></div>
  </div>`;
  
  html+=`<div class="charts-row"><div class="cb"><h3>Посетители и клики по месяцам</h3><div class="chart-wrap"><canvas id="cV"></canvas></div></div>
  <div class="cb"><h3>Заявки по месяцам</h3><div class="chart-wrap"><canvas id="cL"></canvas></div></div></div>`;
  
  html+=`<div class="tb"><h3>Помесячная сводка — ${curYear}</h3><table><thead><tr><th>Месяц</th><th class="n">Посетители</th><th class="n">Клики</th><th class="n">Заявки</th><th class="n">Конверсия</th></tr></thead><tbody>`;
  sortedMonths.forEach((m,i)=>{
    const d=yearData.months[m].total;
    if(!d)return;
    html+=`<tr><td>${MONTH_FULL[m]}</td><td class="n">${fmt(d.visitors)}</td><td class="n">${fmt(d.clicks)}</td><td class="n">${d.leads}</td><td class="n">${d.conv.toFixed(2).replace('.',',')}%</td></tr>`;
  });
  html+=`<tr class="total"><td>Итого</td><td class="n" style="color:#2997ff">${fmt(tv)}</td><td class="n" style="color:#bf5af2">${fmt(tc2)}</td><td class="n" style="color:#30d158">${fmt(tl)}</td><td class="n" style="color:#ff9f0a">${avgConv}%</td></tr></tbody></table></div>`;
  
  html+=`<div class="cb"><h3>Каналы — суммарно за ${curYear}</h3><div class="chart-wrap"><canvas id="cC"></canvas></div></div>`;
  
  document.getElementById('dashboard').innerHTML=html;
  
  if(chart1)chart1.destroy();if(chart2)chart2.destroy();if(chart3)chart3.destroy();
  
  chart1=new Chart(document.getElementById('cV'),{type:'line',data:{labels:months,datasets:[
    {label:'Посетители',data:visitors,borderColor:'#2997ff',backgroundColor:'rgba(41,151,255,0.08)',fill:true,tension:.4,pointRadius:3,borderWidth:2},
    {label:'Клики',data:clicks,borderColor:'#bf5af2',backgroundColor:'rgba(191,90,242,0.08)',fill:true,tension:.4,pointRadius:3,borderWidth:2,yAxisID:'y1'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc,font:{size:11},boxWidth:12}}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc,callback:v=>v>=1000?(v/1000)+'K':v}},y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:tc,callback:v=>v>=1000?(v/1000)+'K':v}}}}});
  
  chart2=new Chart(document.getElementById('cL'),{type:'bar',data:{labels:months,datasets:[{label:'Заявки',data:leads,backgroundColor:leads.map(v=>{const mx=Math.max(...leads);return v>=mx*0.7?'#30d158':'rgba(48,209,88,0.5)'}),borderRadius:4,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc}}}}});
  
  const chSorted=Object.entries(channelAgg).sort((a,b)=>b[1].visitors-a[1].visitors);
  chart3=new Chart(document.getElementById('cC'),{type:'bar',data:{labels:chSorted.map(c=>c[0]),datasets:[
    {label:'Посетители (тыс.)',data:chSorted.map(c=>+(c[1].visitors/1000).toFixed(1)),backgroundColor:'#2997ff',borderRadius:3,barPercentage:.7},
    {label:'Клики (тыс.)',data:chSorted.map(c=>+(c[1].clicks/1000).toFixed(1)),backgroundColor:'#bf5af2',borderRadius:3,barPercentage:.7}
  ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{labels:{color:tc,font:{size:11},boxWidth:12}}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc,font:{size:11}}}}}});
}

loadData();
</script>
</body>
</html>
