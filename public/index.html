<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustabor — AI CEO Аналитика</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html{font-size:16px}
  body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;min-height:100vh}
  nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:#fff;border-bottom:1px solid rgba(0,0,0,0.08)}
  .nav-inner{max-width:1200px;margin:0 auto;padding:0 2rem;height:100px;display:flex;align-items:center;justify-content:space-between}
  .nav-logo{display:flex;align-items:center;text-decoration:none}
  .nav-logo .logo-img{height:70px;width:auto;object-fit:contain}
  .nav-links{display:flex;gap:2rem;list-style:none;align-items:center}
  .nav-links a{color:#6e6e73;text-decoration:none;font-size:.9rem;font-weight:500;transition:color .3s}
  .nav-links a:hover{color:#1d1d1f}
  .nav-cta{padding:10px 24px;background:#0071e3;color:#fff!important;border-radius:980px;font-size:.9rem!important;font-weight:500!important;transition:background .3s}
  .nav-cta:hover{background:#2997ff!important}
  @media(max-width:768px){.nav-links{display:none}.nav-logo .logo-img{height:50px}.nav-inner{height:72px}}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="#" class="nav-logo"><img src="logo.png" alt="Ustabor" class="logo-img"></a>
    <ul class="nav-links">
      <li><a href="#features">Возможности</a></li>
      <li><a href="#how">Как работает</a></li>
      <li><a href="#stats">Результаты</a></li>
      <li><a href="#cta" class="nav-cta">Начать</a></li>
    </ul>
  </div>
</nav>
</body>
</html>
