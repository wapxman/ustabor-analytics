<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ustabor — AI CEO Аналитика</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:#0a0a0f;color:#fff;-webkit-font-smoothing:antialiased}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:#fff;border-bottom:1px solid rgba(0,0,0,0.08)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 2rem;height:72px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;text-decoration:none}
.logo-img{height:44px;width:auto;object-fit:contain}
.nav-links{display:flex;gap:2rem;list-style:none;align-items:center}
.nav-links a{color:#6e6e73;text-decoration:none;font-size:.9rem;font-weight:500}
.nav-cta{padding:10px 24px;background:#0071e3;color:#fff!important;border-radius:980px}
.tabs-bar{position:fixed;top:72px;left:0;right:0;z-index:999;background:#111118;border-bottom:1px solid rgba(255,255,255,0.06)}
.tabs-inner{max-width:1200px;margin:0 auto;padding:0 2rem;display:flex;gap:0}
.tab{padding:14px 24px;font-size:.85rem;font-weight:500;color:#6e6e73;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:#fff}.tab.active{color:#2997ff;border-bottom-color:#2997ff}
.content{max-width:1200px;margin:0 auto;padding:152px 2rem 3rem;display:none}
.content.visible{display:block}
.report-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.report-header h1{font-size:1.8rem;font-weight:700;letter-spacing:-0.03em}
.report-header p{color:#6e6e73;font-size:.9rem;margin-top:.3rem}
.filters{display:flex;gap:.5rem;align-items:center}
.yr-btn{padding:8px 18px;border-radius:980px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#6e6e73;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.yr-btn:hover{border-color:rgba(255,255,255,0.3);color:#fff}
.yr-btn.active{background:#2997ff;border-color:#2997ff;color:#fff}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;margin-bottom:1.5rem}
.mc{background:#16161e;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:1.2rem}
.mc .l{font-size:.7rem;color:#6e6e73;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem}
.mc .v{font-size:1.6rem;font-weight:700;letter-spacing:-0.03em}
.mc .c{font-size:.75rem;margin-top:.2rem;color:#30d158;font-weight:500}
.vb{color:#2997ff}.vp{color:#bf5af2}.vg{color:#30d158}.va{color:#ff9f0a}
.charts-row{display:grid;grid-template-columns:3fr 2fr;gap:.8rem;margin-bottom:.8rem}
.cb{background:#16161e;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:1.2rem;margin-bottom:.8rem}
.cb h3{font-size:.85rem;font-weight:600;margin-bottom:.8rem}
.chart-wrap{position:relative;height:220px}
.chart-wrap-tall{position:relative;height:320px}
.tb{background:#16161e;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:1.2rem;overflow-x:auto;margin-bottom:.8rem}
.tb h3{font-size:.85rem;font-weight:600;margin-bottom:.8rem}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{text-align:left;padding:8px 10px;color:#6e6e73;font-weight:500;border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,0.02)}
.n{text-align:right;font-variant-numeric:tabular-nums}
.total td{font-weight:600;border-top:2px solid rgba(255,255,255,0.1)}
.loading{text-align:center;padding:4rem;color:#6e6e73}
.loading .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:#2997ff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.placeholder{text-align:center;padding:6rem 2rem;color:#6e6e73}
.ch-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.8rem;margin-bottom:1.5rem}
.ch-card{background:#16161e;border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:1rem;cursor:pointer;transition:all .2s}
.ch-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-2px)}
.ch-card.sel{border-color:#2997ff;background:#1a1a2e}
.ch-card .ch-name{font-size:.78rem;font-weight:600;margin-bottom:.5rem;color:#fff}
.ch-card .ch-val{font-size:1.3rem;font-weight:700;color:#2997ff}
.ch-card .ch-sub{font-size:.7rem;color:#6e6e73;margin-top:.2rem}
@media(max-width:900px){.metrics-grid{grid-template-columns:repeat(2,1fr)}.charts-row{grid-template-columns:1fr}.ch-cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.metrics-grid{grid-template-columns:1fr}.tabs-inner{overflow-x:auto}.nav-links{display:none}.report-header{flex-direction:column}.ch-cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav><div class="nav-inner"><a href="#" class="nav-logo"><img src="logo.png" alt="Ustabor" class="logo-img"></a><ul class="nav-links"><li><a href="#" class="nav-cta">Начать</a></li></ul></div></nav>

<div class="tabs-bar"><div class="tabs-inner">
  <div class="tab active" onclick="showTab(0)">Трафик сайта</div>
  <div class="tab" onclick="showTab(1)">Каналы</div>
  <div class="tab" onclick="showTab(2)">Направления</div>
  <div class="tab" onclick="showTab(3)">Приложение</div>
</div></div>

<div class="content visible" id="tab-0">
  <div class="report-header">
    <div><h1>Трафик сайта — <span id="yr-title">2024</span></h1><p id="yr-sub">Загрузка...</p></div>
    <div class="filters" id="yf0"></div>
  </div>
  <div id="dashboard"><div class="loading"><div class="spinner"></div>Загрузка данных из Google Sheets...</div></div>
</div>

<div class="content" id="tab-1">
  <div class="report-header">
    <div><h1>Каналы — <span id="yr-title2">2024</span></h1><p id="yr-sub2">Детальная разбивка по каналам трафика</p></div>
    <div class="filters" id="yf1"></div>
  </div>
  <div id="channels-dash"><div class="loading"><div class="spinner"></div>Загрузка...</div></div>
</div>

<div class="content" id="tab-2"><div class="placeholder"><h1>Направления</h1><p>Скоро будет добавлен</p></div></div>
<div class="content" id="tab-3"><div class="placeholder"><h1>Приложение</h1><p>Скоро будет добавлен</p></div></div>

<script>
function showTab(n){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  document.querySelectorAll('.content').forEach((e,i)=>e.classList.toggle('visible',i===n));
}

const SHEET_ID='1VkQwl1aknuWDExiTqadsvf6FmnLWcUwCEsM_joUAmmk';
const MRU={'январь':0,'февраль':1,'март':2,'апрель':3,'май':4,'июнь':5,'июль':6,'август':7,'сентябрь':8,'октябрь':9,'ноябрь':10,'декабрь':11};
const MS=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MF=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const CHCOL=['#2997ff','#bf5af2','#30d158','#ff9f0a','#ff453a','#64d2ff','#ffd60a','#ac8e68','#ff375f','#5e5ce6'];

let AD={},curY=2024,selCh=null;
let c1=null,c2=null,c3=null,c4=null,c5=null;
const gc='rgba(255,255,255,0.04)',tc='#6e6e73';

function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')}
function pN(s){if(!s)return 0;return parseInt(String(s).replace(/\s/g,'').replace(/,/g,''))||0}
function pC(s){if(!s)return 0;return parseFloat(String(s).replace(',','.').replace('%',''))||0}

async function loadData(){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('Каналы')}`;
    const res=await fetch(url);const text=await res.text();
    const json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?/)[1]);
    let cM=null,cY=null;
    json.table.rows.forEach(row=>{
      const cells=row.c||[];const a=cells[0]?cells[0].v:'';if(!a)return;
      const s=String(a).trim(),mm=s.match(/^(\S+)\s+(\d{4})$/i);
      if(mm){const mn=mm[1].toLowerCase(),yr=parseInt(mm[2]);if(MRU[mn]!==undefined){cM=MRU[mn];cY=yr;if(!AD[yr])AD[yr]={months:{}};if(!AD[yr].months[cM])AD[yr].months[cM]={channels:[],total:null}}return}
      if(s==='Канал'||!cY)return;
      const v=cells[1]?pN(cells[1].v):0,cl=cells[2]?pN(cells[2].v):0,ld=cells[3]?pN(cells[3].v):0,cv=cells[4]?(cells[4].v||cells[4].f||'0%'):'0%';
      if(s==='Итого')AD[cY].months[cM].total={visitors:v,clicks:cl,leads:ld,conv:pC(cv)};
      else AD[cY].months[cM].channels.push({name:s,visitors:v,clicks:cl,leads:ld,conv:pC(cv)});
    });
    const yrs=Object.keys(AD).map(Number).sort();
    curY=yrs.includes(2024)?2024:yrs[yrs.length-1];
    renderAll();
  }catch(e){
    document.getElementById('dashboard').innerHTML=`<div class="loading" style="color:#ff453a">Ошибка: ${e.message}</div>`;
    document.getElementById('channels-dash').innerHTML=`<div class="loading" style="color:#ff453a">Ошибка: ${e.message}</div>`;
  }
}

function yrBtns(id){
  const yrs=Object.keys(AD).map(Number).sort();
  document.getElementById(id).innerHTML=yrs.map(y=>`<button class="yr-btn${y===curY?' active':''}" onclick="setY(${y})">${y}</button>`).join('');
}
function setY(y){curY=y;selCh=null;renderAll()}
function renderAll(){yrBtns('yf0');yrBtns('yf1');renderTraffic();renderChannels()}

function getYearData(){
  const yd=AD[curY];if(!yd)return null;
  const sm=Object.keys(yd.months).map(Number).sort((a,b)=>a-b);
  const mo=[],vi=[],cl=[],le=[],co=[];const ca={};
  sm.forEach(m=>{const d=yd.months[m];if(!d.total)return;mo.push(MS[m]);vi.push(d.total.visitors);cl.push(d.total.clicks);le.push(d.total.leads);co.push(d.total.conv);
    d.channels.forEach(ch=>{if(!ca[ch.name])ca[ch.name]={visitors:0,clicks:0,leads:0,monthly:{}};ca[ch.name].visitors+=ch.visitors;ca[ch.name].clicks+=ch.clicks;ca[ch.name].leads+=ch.leads;ca[ch.name].monthly[m]=ch});
  });
  const tv=vi.reduce((a,b)=>a+b,0),tcl=cl.reduce((a,b)=>a+b,0),tl=le.reduce((a,b)=>a+b,0);
  return{sm,mo,vi,cl,le,co,ca,tv,tcl,tl,avgConv:tv>0?((tcl/tv)*100).toFixed(1):'0'}
}

function renderTraffic(){
  const d=getYearData();if(!d){document.getElementById('dashboard').innerHTML='<div class="loading">Нет данных</div>';return}
  const fm=MF[d.sm[0]],lm=MF[d.sm[d.sm.length-1]];
  document.getElementById('yr-title').textContent=curY;
  document.getElementById('yr-sub').textContent=`${fm} — ${lm} ${curY} · live из Google Sheets`;
  let h=`<div class="metrics-grid">
    <div class="mc"><div class="l">Посетители</div><div class="v vb">${d.tv>=1000?(d.tv/1000).toFixed(0)+'K':d.tv}</div><div class="c">${d.mo.length} мес.</div></div>
    <div class="mc"><div class="l">Клики</div><div class="v vp">${d.tcl>=1000?(d.tcl/1000).toFixed(1)+'K':d.tcl}</div><div class="c">на контакты</div></div>
    <div class="mc"><div class="l">Заявки</div><div class="v vg">${fmt(d.tl)}</div><div class="c">${fm}–${lm}</div></div>
    <div class="mc"><div class="l">Ср. конверсия</div><div class="v va">${d.avgConv}%</div><div class="c">клики/посетители</div></div></div>`;
  h+=`<div class="charts-row"><div class="cb"><h3>Посетители и клики</h3><div class="chart-wrap"><canvas id="cV"></canvas></div></div>
  <div class="cb"><h3>Заявки</h3><div class="chart-wrap"><canvas id="cL"></canvas></div></div></div>`;
  h+=`<div class="tb"><h3>Помесячная сводка — ${curY}</h3><table><thead><tr><th>Месяц</th><th class="n">Посетители</th><th class="n">Клики</th><th class="n">Заявки</th><th class="n">Конверсия</th></tr></thead><tbody>`;
  d.sm.forEach(m=>{const t=AD[curY].months[m].total;if(!t)return;h+=`<tr><td>${MF[m]}</td><td class="n">${fmt(t.visitors)}</td><td class="n">${fmt(t.clicks)}</td><td class="n">${t.leads}</td><td class="n">${t.conv.toFixed(2).replace('.',',')}%</td></tr>`});
  h+=`<tr class="total"><td>Итого</td><td class="n" style="color:#2997ff">${fmt(d.tv)}</td><td class="n" style="color:#bf5af2">${fmt(d.tcl)}</td><td class="n" style="color:#30d158">${fmt(d.tl)}</td><td class="n" style="color:#ff9f0a">${d.avgConv}%</td></tr></tbody></table></div>`;
  h+=`<div class="cb"><h3>Каналы — суммарно</h3><div class="chart-wrap"><canvas id="cC"></canvas></div></div>`;
  document.getElementById('dashboard').innerHTML=h;
  if(c1)c1.destroy();if(c2)c2.destroy();if(c3)c3.destroy();
  c1=new Chart(document.getElementById('cV'),{type:'line',data:{labels:d.mo,datasets:[
    {label:'Посетители',data:d.vi,borderColor:'#2997ff',backgroundColor:'rgba(41,151,255,0.08)',fill:true,tension:.4,pointRadius:3,borderWidth:2},
    {label:'Клики',data:d.cl,borderColor:'#bf5af2',backgroundColor:'rgba(191,90,242,0.08)',fill:true,tension:.4,pointRadius:3,borderWidth:2,yAxisID:'y1'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc,font:{size:11},boxWidth:12}}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc,callback:v=>v>=1000?(v/1000)+'K':v}},y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:tc,callback:v=>v>=1000?(v/1000)+'K':v}}}}});
  c2=new Chart(document.getElementById('cL'),{type:'bar',data:{labels:d.mo,datasets:[{data:d.le,backgroundColor:d.le.map(v=>{const mx=Math.max(...d.le);return v>=mx*.7?'#30d158':'rgba(48,209,88,0.5)'}),borderRadius:4,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc}}}}});
  const cs=Object.entries(d.ca).sort((a,b)=>b[1].visitors-a[1].visitors);
  c3=new Chart(document.getElementById('cC'),{type:'bar',data:{labels:cs.map(c=>c[0]),datasets:[
    {label:'Посетители (тыс.)',data:cs.map(c=>+(c[1].visitors/1000).toFixed(1)),backgroundColor:'#2997ff',borderRadius:3,barPercentage:.7},
    {label:'Клики (тыс.)',data:cs.map(c=>+(c[1].clicks/1000).toFixed(1)),backgroundColor:'#bf5af2',borderRadius:3,barPercentage:.7}
  ]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{labels:{color:tc,font:{size:11},boxWidth:12}}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc,font:{size:11}}}}}});
}

function renderChannels(){
  const d=getYearData();if(!d){document.getElementById('channels-dash').innerHTML='<div class="loading">Нет данных</div>';return}
  const fm=MF[d.sm[0]],lm=MF[d.sm[d.sm.length-1]];
  document.getElementById('yr-title2').textContent=curY;
  document.getElementById('yr-sub2').textContent=`${fm} — ${lm} ${curY} · Детальная разбивка по каналам`;
  const cs=Object.entries(d.ca).sort((a,b)=>b[1].visitors-a[1].visitors);
  if(!selCh&&cs.length)selCh=cs[0][0];
  let h=`<div class="ch-cards">`;
  cs.forEach(([name,data],i)=>{
    const pct=d.tv>0?((data.visitors/d.tv)*100).toFixed(1):'0';
    h+=`<div class="ch-card${name===selCh?' sel':''}" onclick="selCh='${name.replace(/'/g,"\\'")}';renderChannels()">
      <div class="ch-name">${name}</div><div class="ch-val">${(data.visitors/1000).toFixed(1)}K</div>
      <div class="ch-sub">${pct}% трафика · ${data.leads} заявок</div></div>`;
  });
  h+=`</div>`;
  h+=`<div class="charts-row"><div class="cb"><h3>${selCh} — посетители по месяцам</h3><div class="chart-wrap"><canvas id="cChV"></canvas></div></div>
  <div class="cb"><h3>${selCh} — заявки по месяцам</h3><div class="chart-wrap"><canvas id="cChL"></canvas></div></div></div>`;
  h+=`<div class="cb"><h3>Все каналы — посетители по месяцам</h3><div class="chart-wrap-tall"><canvas id="cChAll"></canvas></div></div>`;
  h+=`<div class="tb"><h3>Каналы — сводная таблица ${curY}</h3><table><thead><tr><th>Канал</th><th class="n">Посетители</th><th class="n">% трафика</th><th class="n">Клики</th><th class="n">Заявки</th><th class="n">Конверсия</th></tr></thead><tbody>`;
  cs.forEach(([name,data])=>{
    const pct=d.tv>0?((data.visitors/d.tv)*100).toFixed(1):'0';
    const cv=data.visitors>0?((data.clicks/data.visitors)*100).toFixed(2):'0';
    h+=`<tr><td>${name}</td><td class="n">${fmt(data.visitors)}</td><td class="n">${pct}%</td><td class="n">${fmt(data.clicks)}</td><td class="n">${data.leads}</td><td class="n">${cv.replace('.',',')}%</td></tr>`;
  });
  h+=`<tr class="total"><td>Итого</td><td class="n" style="color:#2997ff">${fmt(d.tv)}</td><td class="n">100%</td><td class="n" style="color:#bf5af2">${fmt(d.tcl)}</td><td class="n" style="color:#30d158">${fmt(d.tl)}</td><td class="n" style="color:#ff9f0a">${d.avgConv}%</td></tr></tbody></table></div>`;
  document.getElementById('channels-dash').innerHTML=h;
  if(c4)c4.destroy();if(c5)c5.destroy();
  const chData=d.ca[selCh];
  if(chData){
    const chVis=d.sm.map(m=>chData.monthly[m]?chData.monthly[m].visitors:0);
    const chLds=d.sm.map(m=>chData.monthly[m]?chData.monthly[m].leads:0);
    c4=new Chart(document.getElementById('cChV'),{type:'line',data:{labels:d.mo,datasets:[{label:selCh,data:chVis,borderColor:'#2997ff',backgroundColor:'rgba(41,151,255,0.1)',fill:true,tension:.4,pointRadius:4,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc,callback:v=>v>=1000?(v/1000)+'K':v}}}}});
    c5=new Chart(document.getElementById('cChL'),{type:'bar',data:{labels:d.mo,datasets:[{data:chLds,backgroundColor:'#30d158',borderRadius:4,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc}}}}});
  }
  const topCh=cs.slice(0,6);
  let c6=new Chart(document.getElementById('cChAll'),{type:'line',data:{labels:d.mo,datasets:topCh.map(([name,data],i)=>({label:name,data:d.sm.map(m=>data.monthly[m]?data.monthly[m].visitors:0),borderColor:CHCOL[i%CHCOL.length],backgroundColor:'transparent',tension:.4,pointRadius:2,borderWidth:2}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc,font:{size:11},boxWidth:12}}},scales:{x:{grid:{color:gc},ticks:{color:tc}},y:{grid:{color:gc},ticks:{color:tc,callback:v=>v>=1000?(v/1000)+'K':v}}}}});
}

loadData();
</script>
</body>
</html>
